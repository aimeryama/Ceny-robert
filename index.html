<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bitcoin Price Live</title>

<link rel="preconnect" href="https://api.binance.com">
<link rel="preconnect" href="https://www.gold-api.com">

<style>

body{
background:#000;
color:#fff;
font-family:Inter,system-ui,sans-serif;
margin:0;
}

.mono{
font-family:monospace;
}

.grid-container{
display:grid;
grid-template-columns:1fr;
gap:1.5rem;
padding:2rem;
}

@media(min-width:900px){
.grid-container{
grid-template-columns:1fr 1fr;
}
}

.asset-card{
background:#0a0a0a;
border:1px solid #1a1a1a;
padding:28px;
border-radius:8px;
}

.asset-card h2{
margin:0 0 16px 0;
font-size:1.4rem;
}

.price-display{
font-size:2.5rem;
font-weight:700;
margin-bottom:6px;
}

.positive{
color:#10b981;
}

.negative{
color:#ef4444;
}

</style>
</head>

<body>

<main>

<div class="grid-container">

<article id="btc" class="asset-card">
<h2>Bitcoin</h2>

<div id="btc-price">
<div class="price-display mono">--</div>
</div>

<div id="btc-24h"></div>

</article>


<article id="eth" class="asset-card">
<h2>Ethereum</h2>

<div id="eth-price">
<div class="price-display mono">--</div>
</div>

<div id="eth-24h"></div>

</article>


<article id="gold" class="asset-card">
<h2>Gold</h2>

<div id="gold-price">
<div class="price-display mono">--</div>
</div>

</article>


<article id="silver" class="asset-card">
<h2>Silver</h2>

<div id="silver-price">
<div class="price-display mono">--</div>
</div>

</article>

</div>

</main>

<script>

const REFRESH_INTERVAL = 60000

function formatPrice(v){
return "$"+Number(v).toLocaleString("en-US",{maximumFractionDigits:2})
}

async function fetchCrypto(){

try{

const btcRes = await fetch("https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT")
const ethRes = await fetch("https://api.binance.com/api/v3/ticker/24hr?symbol=ETHUSDT")

const btc = await btcRes.json()
const eth = await ethRes.json()

const btcPrice = parseFloat(btc.lastPrice)
const btcChange = parseFloat(btc.priceChangePercent)

const ethPrice = parseFloat(eth.lastPrice)
const ethChange = parseFloat(eth.priceChangePercent)

document.getElementById("btc-price").innerHTML =
'<div class="price-display mono">'+formatPrice(btcPrice)+'</div>'

document.getElementById("btc-24h").innerHTML =
'<span class="'+(btcChange>=0?'positive':'negative')+'">'+btcChange.toFixed(2)+'%</span>'


document.getElementById("eth-price").innerHTML =
'<div class="price-display mono">'+formatPrice(ethPrice)+'</div>'

document.getElementById("eth-24h").innerHTML =
'<span class="'+(ethChange>=0?'positive':'negative')+'">'+ethChange.toFixed(2)+'%</span>'

}catch(e){

console.log("crypto error",e)

}

}



async function fetchMetals(){

try{

const goldRes = await fetch(
"https://api.allorigins.win/raw?url=https://www.gold-api.com/price/XAU"
)

const silverRes = await fetch(
"https://api.allorigins.win/raw?url=https://www.gold-api.com/price/XAG"
)

const gold = await goldRes.json()
const silver = await silverRes.json()

document.getElementById("gold-price").innerHTML =
'<div class="price-display mono">'+formatPrice(gold.price)+'</div>'

document.getElementById("silver-price").innerHTML =
'<div class="price-display mono">'+formatPrice(silver.price)+'</div>'

}catch(e){

console.log("metals error",e)

}

}



async function updatePrices(){

await fetchCrypto()
await fetchMetals()

}

updatePrices()

setInterval(updatePrices,REFRESH_INTERVAL)

</script>

</body>
</html>
