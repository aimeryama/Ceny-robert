<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bitcoin Price Live</title>

<link rel="preconnect" href="https://api.binance.com">
<link rel="preconnect" href="https://www.gold-api.com">

<style>

body{
background:#000;
color:#fff;
font-family:Inter,system-ui,sans-serif;
margin:0;
padding:0;
}

.mono{
font-family:monospace;
}

.asset-card{
background:#0a0a0a;
border:1px solid #1a1a1a;
padding:20px;
}

.price-display{
font-size:2rem;
font-weight:700;
}

.positive{
color:#10b981;
}

.negative{
color:#ef4444;
}

.grid-container{
display:grid;
grid-template-columns:1fr;
gap:1.25rem;
padding:20px;
}

@media(min-width:768px){
.grid-container{
grid-template-columns:1fr 1fr;
}
}

h2{
margin-top:0;
}

</style>

</head>

<body>

<main>

<div class="grid-container">

<article id="btc" class="asset-card">
<h2>Bitcoin</h2>

<div id="btc-price">
<div class="price-display mono">--</div>
</div>

<div id="btc-24h"></div>

</article>


<article id="eth" class="asset-card">
<h2>Ethereum</h2>

<div id="eth-price">
<div class="price-display mono">--</div>
</div>

<div id="eth-24h"></div>

</article>


<article id="gold" class="asset-card">
<h2>Gold</h2>

<div id="gold-price">
<div class="price-display mono">--</div>
</div>

</article>


<article id="silver" class="asset-card">
<h2>Silver</h2>

<div id="silver-price">
<div class="price-display mono">--</div>
</div>

</article>

</div>

</main>

<script>

const REFRESH_INTERVAL = 60000


function formatPrice(v){
return "$" + Number(v).toLocaleString("en-US",{maximumFractionDigits:2})
}



async function fetchCrypto(){

try{

const btcResponse = await fetch("https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT")
const ethResponse = await fetch("https://api.binance.com/api/v3/ticker/24hr?symbol=ETHUSDT")

const btc = await btcResponse.json()
const eth = await ethResponse.json()


const btcPrice = parseFloat(btc.lastPrice)
const btcChange = parseFloat(btc.priceChangePercent)

const ethPrice = parseFloat(eth.lastPrice)
const ethChange = parseFloat(eth.priceChangePercent)



document.getElementById("btc-price").innerHTML =
'<div class="price-display mono">'+formatPrice(btcPrice)+'</div>'

document.getElementById("btc-24h").innerHTML =
'<span class="'+(btcChange>=0?'positive':'negative')+'">'+btcChange.toFixed(2)+'%</span>'



document.getElementById("eth-price").innerHTML =
'<div class="price-display mono">'+formatPrice(ethPrice)+'</div>'

document.getElementById("eth-24h").innerHTML =
'<span class="'+(ethChange>=0?'positive':'negative')+'">'+ethChange.toFixed(2)+'%</span>'


}catch(e){

console.log("crypto error",e)

}

}



async function fetchMetals(){

try{

const goldResponse = await fetch("https://www.gold-api.com/price/XAU")
const silverResponse = await fetch("https://www.gold-api.com/price/XAG")

const gold = await goldResponse.json()
const silver = await silverResponse.json()



document.getElementById("gold-price").innerHTML =
'<div class="price-display mono">'+formatPrice(gold.price)+'</div>'


document.getElementById("silver-price").innerHTML =
'<div class="price-display mono">'+formatPrice(silver.price)+'</div>'


}catch(e){

console.log("metals error",e)

}

}



async function updatePrices(){

await fetchCrypto()
await fetchMetals()

}



updatePrices()

setInterval(updatePrices,REFRESH_INTERVAL)

</script>

</body>
</html>
