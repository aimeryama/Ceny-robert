<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crypto & Metals Dashboard</title>

<style>

body{
background:#000;
color:#fff;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
margin:0;
padding:40px;
}

.grid{
display:grid;
grid-template-columns:1fr;
gap:40px;
}

@media(min-width:900px){
.grid{
grid-template-columns:1fr 1fr;
}
}

.card{
background:#050505;
border:1px solid #222;
padding:40px;
}

h2{
margin:0 0 20px 0;
font-size:28px;
}

.price{
font-size:48px;
font-weight:700;
}

.change{
margin-top:8px;
font-size:18px;
}

.up{
color:#22c55e;
}

.down{
color:#ef4444;
}

</style>

</head>

<body>

<div class="grid">

<div class="card">
<h2>Bitcoin</h2>
<div id="btc-price" class="price">--</div>
<div id="btc-change" class="change"></div>
</div>

<div class="card">
<h2>Ethereum</h2>
<div id="eth-price" class="price">--</div>
<div id="eth-change" class="change"></div>
</div>

<div class="card">
<h2>Gold</h2>
<div id="gold-price" class="price">--</div>
</div>

<div class="card">
<h2>Silver</h2>
<div id="silver-price" class="price">--</div>
</div>

</div>

<script>

function money(v){
return "$"+Number(v).toLocaleString("en-US",{maximumFractionDigits:2})
}

async function fetchCrypto(){

try{

const btc = await fetch(
"https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT"
).then(r=>r.json())

const eth = await fetch(
"https://api.binance.com/api/v3/ticker/24hr?symbol=ETHUSDT"
).then(r=>r.json())

document.getElementById("btc-price").textContent =
money(btc.lastPrice)

document.getElementById("btc-change").textContent =
Number(btc.priceChangePercent).toFixed(2)+"%"

document.getElementById("btc-change").className =
"change "+(btc.priceChangePercent>=0?"up":"down")


document.getElementById("eth-price").textContent =
money(eth.lastPrice)

document.getElementById("eth-change").textContent =
Number(eth.priceChangePercent).toFixed(2)+"%"

document.getElementById("eth-change").className =
"change "+(eth.priceChangePercent>=0?"up":"down")

}catch(e){
console.error("crypto error",e)
}

}

async function fetchMetals(){

try{

const res = await fetch(
"https://api.twelvedata.com/price?symbol=XAU/USD,XAG/USD&apikey=demo"
)

const data = await res.json()

const gold = parseFloat(data["XAU/USD"].price)
const silver = parseFloat(data["XAG/USD"].price)

document.getElementById("gold-price").textContent =
money(gold)

document.getElementById("silver-price").textContent =
money(silver)

}catch(e){
console.error("metals error",e)
}

}

async function update(){

await fetchCrypto()
await fetchMetals()

}

update()

setInterval(update,60000)

</script>

</body>
</html>
