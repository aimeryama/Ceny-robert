<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Prices</title>

<style>
body{
background:#000;
color:#fff;
font-family:Arial,Helvetica,sans-serif;
margin:0;
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
max-width:1000px;
margin:auto;
}

.card{
background:#0f0f0f;
border:1px solid #1f1f1f;
border-radius:12px;
padding:20px;
}

.price{
font-size:32px;
font-weight:700;
margin-top:10px;
}

.change{
margin-top:5px;
font-size:14px;
}

.up{color:#10b981;}
.down{color:#ef4444;}
</style>
</head>

<body>

<div class="grid">

<div class="card">
<h2>Bitcoin</h2>
<div id="btc-price" class="price">loading</div>
<div id="btc-change" class="change"></div>
</div>

<div class="card">
<h2>Ethereum</h2>
<div id="eth-price" class="price">loading</div>
<div id="eth-change" class="change"></div>
</div>

<div class="card">
<h2>Gold</h2>
<div id="gold-price" class="price">loading</div>
</div>

<div class="card">
<h2>Silver</h2>
<div id="silver-price" class="price">loading</div>
</div>

</div>

<script>

function formatPrice(v){
return "$"+Number(v).toLocaleString("en-US",{maximumFractionDigits:2});
}

function formatChange(v){
let cls=v>=0?"up":"down";
let arrow=v>=0?"▲":"▼";
return `<span class="${cls}">${arrow} ${Math.abs(v).toFixed(2)}%</span>`;
}

async function fetchCrypto(){

let assets=[
{symbol:"BTCUSDT",price:"btc-price",change:"btc-change"},
{symbol:"ETHUSDT",price:"eth-price",change:"eth-change"}
];

for(let a of assets){

try{

let r=await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${a.symbol}`);
let d=await r.json();

document.getElementById(a.price).textContent=formatPrice(d.lastPrice);
document.getElementById(a.change).innerHTML=formatChange(parseFloat(d.priceChangePercent));

}catch(e){
console.error(e);
}

}

}

async function fetchMetals(){

  try {

        const res = await fetch("https://api.metals.live/v1/spot");

        const data = await res.json();

        const gold = data.find(x => x.gold)?.gold;
        const silver = data.find(x => x.silver)?.silver;

        document.getElementById("gold-price").textContent =
            "$" + gold.toLocaleString("en-US",{maximumFractionDigits:2});

        document.getElementById("silver-price").textContent =
            "$" + silver.toLocaleString("en-US",{maximumFractionDigits:2});

    } catch(e) {
        console.error("Metals API error", e);
    }
}
async function update(){
await Promise.all([
fetchCrypto(),
fetchMetals()
]);
}

update();
setInterval(update,60000);

</script>

</body>
</html>
